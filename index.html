<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TaskQuick - Perpetual Apex</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskQuick">

    <style>
        :root {
            --primary: #4a9fd6;
            --primary-light: #7ed3ff;
            --danger: #ff4757;
            --success: #2ed573;
            --bg-color: #f5f7fb;
            --text-main: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* ===== NAVIGATION & UI ===== */
        .top-nav {
            position: fixed; top: 12px; left: 12px; right: 12px; height: 75px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px);
            border-radius: 22px; display: flex; align-items: center;
            padding: 0 20px; z-index: 20; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .top-nav b { font-size: 1.4rem; color: #2c5f7a; letter-spacing: -1px; flex-grow: 1; }

        .notif-toggle {
            background: #f1f5f9; border: none; padding: 10px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .notif-toggle.active { background: #dcfce7; }
        .notif-toggle svg { width: 22px; height: 22px; fill: #64748b; }
        .notif-toggle.active svg { fill: var(--success); }

        .add-button {
            position: fixed; bottom: 35px; right: 35px;
            width: 70px; height: 70px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 30; box-shadow: 0 12px 30px rgba(74, 159, 214, 0.4);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .add-button svg { width: 32px; height: 32px; fill: white; }
        .add-button:hover { transform: scale(1.1) rotate(90deg); }

        .history-button {
            position: fixed; bottom: 35px; left: 35px;
            width: 70px; height: 70px; border-radius: 50%;
            background: white; border: 2px solid #e2e8f0;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 30; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: 0.25s;
        }
        .history-button svg { width: 28px; height: 28px; fill: #64748b; }

        .empty-hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #cbd5e1; z-index: 5; pointer-events: none; width: 80%;
        }

        /* ===== MODAL ===== */
        #backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px); display: none; z-index: 50;
        }
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; max-width: 500px; max-height: 85vh; overflow-y: auto;
            background: white; border-radius: 30px; padding: 25px; display: none; z-index: 100;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
        }

        .section-box {
            padding: 15px; border-radius: 20px; border: 2px solid transparent;
            background: #f8fafc; margin-bottom: 15px; transition: 0.3s;
        }
        .section-box.active { border-color: var(--primary); background: #fff; box-shadow: 0 10px 30px rgba(74, 159, 214, 0.1); }
        .section-box.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }

        /* Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .day { padding: 8px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.8rem; }
        .day:hover:not(.disabled-day) { background: #e0f2fe; color: var(--primary); }
        .day.selected { background: var(--primary) !important; color: white !important; font-weight: bold; }
        .day.today { border: 2px solid var(--primary); color: var(--primary); font-weight: bold; }
        .day.disabled-day { color: #cbd5e1; cursor: not-allowed; }
        .day-name { font-size: 0.65rem; color: #94a3b8; font-weight: 800; text-align: center; }

        /* Inputs */
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input, textarea, select { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #e2e8f0; background: #fcfdfe; font-size: 14px; box-sizing: border-box; 
        }
        textarea { height: 60px; resize: none; }

        .segmented-time { display: flex; gap: 8px; }
        .time-box { flex: 1; text-align: center; }
        .time-box input { text-align: center; font-weight: bold; font-size: 1rem; margin-bottom: 2px; padding: 8px; }
        .time-box span { font-size: 0.55rem; color: #94a3b8; font-weight: bold; }

        /* ===== CARDS ===== */
        #taskList {
            position: fixed; top: 105px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; padding: 0 15px 120px;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
            overflow-y: auto; height: calc(100vh - 110px);
        }
        .task-card {
            position: relative; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 20px; border-left: 10px solid var(--primary);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        .alert-overlay {
            position: absolute; inset: 0; background: rgba(255, 71, 87, 0.98);
            border-radius: 20px; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
            color: white; text-align: center; animation: alertPulse 1.5s infinite;
        }
        @keyframes alertPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }

        .alert-overlay h2 { font-size: 1.5rem; margin: 0; font-weight: 900; }
        .alert-overlay button { 
            margin-top: 10px; padding: 10px 25px; border-radius: 50px; 
            border: none; background: white; color: var(--danger); font-weight: 900; cursor: pointer;
        }

        .countdown-pill {
            display: inline-block; background: #f1f5f9; padding: 6px 12px; border-radius: 10px;
            font-family: 'Courier New', monospace; font-weight: 800; color: #1e293b; font-size: 0.9rem;
        }

        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-main { flex: 1; padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: 800; }
        .btn-save { background: var(--primary); color: white; }

        .history-item { border-bottom: 1px solid #f1f5f9; padding: 12px 0; }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="top-nav">
    <b>TaskQuick<span>Apex</span></b>
    <button id="notifBtn" class="notif-toggle" onclick="requestNotifPermission()">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </button>
</div>

<div id="emptyState" class="empty-hint">
    <h2>Ready to plan?</h2>
    <p>Hit + to schedule a task.<br>iOS: Add to Home Screen for Alerts.</p>
</div>

<div class="history-button" onclick="openHistory()">
    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
</div>

<div class="add-button" onclick="openModal()">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</div>

<div id="taskList"></div>
<div id="backdrop" onclick="closeAllModals()"></div>

<div class="modal" id="modal">
    <h2 style="margin-top:0">Schedule Task</h2>
    <input type="hidden" id="editId">
    
    <label>Title</label>
    <input id="title" placeholder="Task Name">

    <label>Description</label>
    <textarea id="desc" placeholder="Details..."></textarea>

    <div class="section-box" id="calSection">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="margin:0">Option 1: Calendar</label>
            <button onclick="clearCal()" style="font-size:0.6rem; cursor:pointer; border:none; background:#eee; padding:4px 8px; border-radius:4px;">Reset</button>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center;">
            <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer;">❮</button>
            <b id="monthYear" style="font-size:0.9rem"></b>
            <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer;">❯</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
            <label style="margin:0">Time:</label>
            <input type="time" id="calTime" value="12:00" style="margin:0; width:110px;">
        </div>
    </div>

    <div class="section-box" id="manSection">
        <label>Option 2: Manual Timer</label>
        <div class="segmented-time">
            <div class="time-box"><input type="number" id="in-d" value="0" oninput="syncLock()"><span>DAYS</span></div>
            <div class="time-box"><input type="number" id="in-h" value="0" oninput="syncLock()"><span>HRS</span></div>
            <div class="time-box"><input type="number" id="in-m" value="0" oninput="syncLock()"><span>MINS</span></div>
            <div class="time-box"><input type="number" id="in-s" value="0" oninput="syncLock()"><span>SECS</span></div>
        </div>
    </div>

    <label>Priority</label>
    <select id="prioSelect"></select>

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
        <input type="checkbox" id="loop" style="width:18px; height:18px; margin:0;">
        <label for="loop" style="margin:0;">Repeat Automatically</label>
    </div>

    <div class="btn-row">
        <button class="btn-main" style="background:#f1f5f9;" onclick="closeModal()">Cancel</button>
        <button class="btn-main btn-save" onclick="saveTask()">Save Task</button>
    </div>
</div>

<div class="modal" id="historyModal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0">History</h2>
        <button onclick="clearHistory()" style="font-size:0.6rem; border:none; background:#fee2e2; color:var(--danger); padding:5px 10px; border-radius:8px;">Wipe</button>
    </div>
    <div id="historyList" style="max-height:45vh; overflow-y:auto; margin-bottom:15px;"></div>
    <button class="btn-main" style="background:#f1f5f9; width:100%;" onclick="closeHistory()">Close</button>
</div>

<script>
let tasks = [];
let completedTasks = [];
let curMonth = new Date();
let selDate = null;

// Service Worker for Mobile Notifications
async function registerSW() {
    if ('serviceWorker' in navigator) {
        const swBlob = new Blob([`
            self.addEventListener('install', (e) => self.skipWaiting());
            self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
            self.addEventListener('notificationclick', (e) => {
                e.notification.close();
                e.waitUntil(clients.openWindow('/'));
            });
        `], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        try { await navigator.serviceWorker.register(swUrl); } catch(e) { console.error("SW fail", e); }
    }
}

async function requestNotifPermission() {
    const permission = await Notification.requestPermission();
    if (permission === "granted") {
        document.getElementById("notifBtn").classList.add("active");
        registerSW();
    } else {
        alert("Enable notifications in settings to get task alerts.");
    }
}

function triggerNotification(title, body) {
    if (Notification.permission === "granted" && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
            reg.showNotification(title, {
                body: body,
                vibrate: [200, 100, 200],
                tag: 'task-alert'
            });
        });
    }
}

// Priority Dropdown
const ps = document.getElementById("prioSelect");
for(let i=1; i<=100; i++) {
    let o = document.createElement("option"); o.value = i; o.innerText = "Priority " + i;
    ps.appendChild(o);
}

function loadStorage() {
    tasks = JSON.parse(localStorage.getItem('tq_tasks') || "[]");
    completedTasks = JSON.parse(localStorage.getItem('tq_history') || "[]");
    if (Notification.permission === "granted") document.getElementById("notifBtn").classList.add("active");
    renderTasks();
}

function saveStorage() {
    localStorage.setItem('tq_tasks', JSON.stringify(tasks));
    localStorage.setItem('tq_history', JSON.stringify(completedTasks));
}

// Calendar
function renderCal() {
    const grid = document.getElementById("calGrid");
    grid.innerHTML = "";
    ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
    document.getElementById("monthYear").innerText = new Intl.DateTimeFormat('en-US', {month:'long', year:'numeric'}).format(curMonth);
    
    const first = new Date(curMonth.getFullYear(), curMonth.getMonth(), 1).getDay();
    const last = new Date(curMonth.getFullYear(), curMonth.getMonth() + 1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);

    for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
    for(let d=1; d<=last; d++) {
        const dObj = new Date(curMonth.getFullYear(), curMonth.getMonth(), d);
        const isPast = dObj < today;
        const isSel = selDate && dObj.toDateString() === selDate.toDateString();
        const dEl = document.createElement("div");
        dEl.className = `day ${isPast ? 'disabled-day' : ''} ${isSel ? 'selected' : ''}`;
        dEl.innerText = d;
        if(!isPast) {
            dEl.onclick = () => { selDate = new Date(dObj); syncLock(); renderCal(); };
        }
        grid.appendChild(dEl);
    }
}
function changeMonth(dir) { curMonth.setMonth(curMonth.getMonth() + dir); renderCal(); }
function clearCal() { selDate = null; syncLock(); renderCal(); }

function syncLock() {
    const hasManual = (parseInt(document.getElementById("in-d").value)||0) + (parseInt(document.getElementById("in-h").value)||0) + (parseInt(document.getElementById("in-m").value)||0) + (parseInt(document.getElementById("in-s").value)||0) > 0;
    document.getElementById("manSection").className = selDate ? "section-box disabled" : (hasManual ? "section-box active" : "section-box");
    document.getElementById("calSection").className = hasManual ? "section-box disabled" : (selDate ? "section-box active" : "section-box");
}

// Modal Handlers
function openModal(id = null) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("backdrop").style.display = "block";
    selDate = null;
    document.getElementById("editId").value = id || "";
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("in-d").value = 0;
    document.getElementById("in-h").value = 0;
    document.getElementById("in-m").value = 0;
    document.getElementById("in-s").value = 0;
    
    if(id) {
        const t = tasks.find(x => x.id === id);
        document.getElementById("title").value = t.title;
        document.getElementById("desc").value = t.desc;
        document.getElementById("prioSelect").value = t.priority;
        document.getElementById("loop").checked = t.loop;
    }
    syncLock(); renderCal();
}

function saveTask() {
    const title = document.getElementById("title").value.trim();
    if(!title) return alert("Title required");

    let dur = 0;
    if(selDate) {
        const t = document.getElementById("calTime").value.split(':');
        selDate.setHours(t[0], t[1], 0);
        dur = Math.floor((selDate - new Date()) / 1000);
    } else {
        dur = (parseInt(document.getElementById("in-d").value)||0)*86400 + (parseInt(document.getElementById("in-h").value)||0)*3600 + (parseInt(document.getElementById("in-m").value)||0)*60 + (parseInt(document.getElementById("in-s").value)||0);
    }

    if(dur <= 0) return alert("Select a future time");

    const id = parseInt(document.getElementById("editId").value) || Date.now();
    const newTask = {
        id, title, desc: document.getElementById("desc").value,
        initial: dur, target: Date.now() + (dur * 1000),
        priority: parseInt(ps.value), loop: document.getElementById("loop").checked
    };

    const idx = tasks.findIndex(x => x.id === id);
    if(idx > -1) tasks[idx] = newTask; else tasks.push(newTask);
    
    tasks.sort((a,b) => a.priority - b.priority);
    saveStorage(); renderTasks(); closeAllModals();
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";
    document.getElementById("emptyState").style.display = tasks.length ? "none" : "block";

    tasks.forEach(t => {
        const rem = Math.max(0, Math.floor((t.target - Date.now()) / 1000));
        const color = `hsl(${((t.priority - 1) / 99) * 200}, 70%, 45%)`;
        const d = Math.floor(rem/86400), h = Math.floor((rem%86400)/3600), m = Math.floor((rem%3600)/60), s = rem%60;
        
        const card = document.createElement("div");
        card.className = "task-card";
        card.style.borderLeftColor = color;
        card.innerHTML = `
            <div class="alert-overlay" id="alert-${t.id}" style="display:${rem <= 0 ? 'flex' : 'none'}">
                <h2>TIME'S UP!</h2>
                <button onclick="resetT(${t.id})">RESTART</button>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <div style="flex:1">
                    <b style="font-size:1.2rem; color:${color}">${t.title}</b>
                    <p style="color:#64748b; margin:5px 0; font-size:0.85rem; line-height:1.2;">${t.desc || '...'}</p>
                    <span class="countdown-pill">${d}d ${h}h ${m}m ${s}s</span>
                </div>
                <div style="font-weight:900; color:${color}; margin-left:10px;">P${t.priority}</div>
            </div>
            <div style="margin-top:12px; border-top:1px solid #eee; padding-top:10px; display:flex; gap:8px;">
                <button onclick="completeT(${t.id})" style="border:none; background:#dcfce7; color:var(--success); padding:6px 10px; border-radius:8px; font-weight:bold; font-size:0.8rem;">Done</button>
                <button onclick="openModal(${t.id})" style="border:none; background:#e0f2fe; color:var(--primary); padding:6px 10px; border-radius:8px; font-weight:bold; font-size:0.8rem;">Edit</button>
                <button onclick="deleteT(${t.id})" style="border:none; background:#fee2e2; color:var(--danger); padding:6px 10px; border-radius:8px; font-weight:bold; font-size:0.8rem;">Del</button>
            </div>
        `;
        list.appendChild(card);
    });
}

// Logic Actions
function completeT(id) {
    const idx = tasks.findIndex(x => x.id === id);
    if(idx > -1) {
        const t = tasks.splice(idx, 1)[0];
        t.completedAt = new Date().toLocaleString();
        completedTasks.unshift(t);
        saveStorage(); renderTasks();
    }
}

function resetT(id) {
    const t = tasks.find(x => x.id === id);
    if(t) { t.target = Date.now() + (t.initial * 1000); saveStorage(); renderTasks(); }
}

function deleteT(id) {
    if(confirm("Delete?")) { tasks = tasks.filter(x => x.id !== id); saveStorage(); renderTasks(); }
}

function openHistory() { document.getElementById("historyModal").style.display = "block"; document.getElementById("backdrop").style.display = "block"; renderHistory(); }
function closeHistory() { document.getElementById("historyModal").style.display = "none"; document.getElementById("backdrop").style.display = "none"; }
function closeModal() { document.getElementById("modal").style.display = "none"; document.getElementById("backdrop").style.display = "none"; }
function closeAllModals() { closeModal(); closeHistory(); }

function renderHistory() {
    const hList = document.getElementById("historyList");
    hList.innerHTML = completedTasks.length ? "" : `<p style="text-align:center; color:#94a3b8;">No history yet.</p>`;
    completedTasks.forEach(t => {
        hList.innerHTML += `<div class="history-item"><b>${t.title}</b><br><small style="color:#94a3b8">${t.completedAt}</small></div>`;
    });
}

function clearHistory() { if(confirm("Clear?")) { completedTasks = []; saveStorage(); renderHistory(); } }

// The Heartbeat Loop
setInterval(() => {
    let changed = false;
    tasks.forEach(t => {
        const rem = t.target - Date.now();
        if(rem <= 0 && rem > -1000) { 
            triggerNotification("Time's Up!", t.title);
            if(t.loop) setTimeout(() => resetT(t.id), 2000);
            changed = true;
        }
    });
    renderTasks();
}, 1000);

// Animated Background
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let balls = [];
function initBg() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    balls = [];
    for (let i = 0; i < 12; i++) balls.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, r: Math.random()*30+10 });
}
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    balls.forEach(b => {
        b.x += b.vx; b.y += b.vy;
        if (b.x<0 || b.x>canvas.width) b.vx*=-1;
        if (b.y<0 || b.y>canvas.height) b.vy*=-1;
        ctx.beginPath(); ctx.fillStyle = "rgba(74, 159, 214, 0.06)"; ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
}
window.addEventListener("resize", initBg);
initBg(); draw(); loadStorage();
</script>
</body>
</html>
